<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>予を共有</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    body { background: #0e0e1c; color: #e6ddff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    .icon { width: 88px; height: 88px; border-radius: 20px; margin-bottom: 16px; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { font-size: 13px; color: #7a5a90; margin-bottom: 28px; line-height: 1.6; }
    .btn { width: 100%; max-width: 360px; padding: 16px; border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: bold; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-share { background: linear-gradient(135deg, #bf00ff, #ff2d55); }
    .btn-copy { background: #2a2a30; border: 1px solid #444; }
    .back-link { margin-top: 20px; font-size: 13px; color: #b14fff; text-decoration: none; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; white-space: nowrap; }
    .toast.show { opacity: 1; }
</style>
</head>
<body>
    <img class="icon" src="icons/icon-192.png" alt="予アイコン">
    <h1>予を共有</h1>
    <p>同僚にこのアプリのリンクを送ることができます。<br>下のボタンからお好きな方法で共有してください。</p>
    <button class="btn btn-share" onclick="doShare()">📤 共有する</button>
    <button class="btn btn-copy" onclick="copyLink()">🔗 リンクをコピー</button>
    <a class="back-link" href="./">← アプリに戻る</a>
    <div id="toast" class="toast"></div>
    <script>
        const APP_URL = "https://silvaoo.github.io/shukkin-search-yobi/";
        const APP_TEXT = "予(出退勤検索くん) 予備ダイヤ";
        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }
        async function doShare() { if (navigator.share) { try { await navigator.share({ title: APP_TEXT, text: APP_TEXT, url: APP_URL }); } catch (e) {} } else { copyLink(); } }
        function copyLink() { navigator.clipboard.writeText(APP_URL).then(() => { showToast('📋 リンクをコピーしました'); }).catch(() => { const ta = document.createElement('textarea'); ta.value = APP_URL; ta.style.position = 'fixed'; ta.style.opacity = '0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); showToast('📋 リンクをコピーしました'); }); }
    </script>
</body>
</html>
