/* 2026・2027年の祝日一覧（国立天文台「暦要項」で確認済み） */
const HOLIDAYS=new Set([
  '2026-01-01','2026-01-12','2026-02-11','2026-02-23','2026-03-20','2026-04-29',
  '2026-05-03','2026-05-04','2026-05-05','2026-05-06','2026-07-20','2026-08-11',
  '2026-09-21','2026-09-22','2026-09-23','2026-10-12','2026-11-03','2026-11-23',
  '2027-01-01','2027-01-11','2027-02-11','2027-02-23','2027-03-21','2027-03-22',
  '2027-04-29','2027-05-03','2027-05-04','2027-05-05','2027-07-19','2027-08-11',
  '2027-09-20','2027-09-23','2027-10-11','2027-11-03','2027-11-23'
]);

/* 曜日の日本語表記 */
const DW=['日','月','火','水','木','金','土'];

/* ダイヤ番号「初期値」計算にのみ使う基準日・基準ダイヤ */
const BASE_DATE=new Date(2026,6,14); // 2026年7月14日(基準日・プレースホルダー用)
const BASE_DIAL=1;

/* 日付をYYYY-MM-DD形式の文字列に変換する */
function toISO(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

/* 指定した日付のNヶ月後を計算する（月末日をまたぐ場合は月末に丸める） */
function addMonths(date,n){
  const d=new Date(date);
  const day=d.getDate();
  d.setDate(1); // 繰り上がりで日付がズレないよう、いったん1日にしてから月を進める
  d.setMonth(d.getMonth()+n);
  const lastDay=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  d.setDate(Math.min(day,lastDay)); // 元の日が翌月に存在しない場合は月末に丸める
  return d;
}

/* その日が祝日かどうか判定する */
function isHol(d){return HOLIDAYS.has(toISO(d));}

/* お盆期間（土曜日ダイヤ扱いになる日）*/
const OBON_DAYS=new Set(['2026-08-13','2026-08-14','2026-08-15']);
function isObon(d){return OBON_DAYS.has(toISO(d));}

/* 日付の種別（平日／土曜／日祝）を判定する（お盆期間は土曜日ダイヤ扱い） */
function dayType(d){const w=d.getDay();if(isObon(d))return '土';if(w===0||isHol(d))return '日祝';if(w===6)return '土';return '平';}

/* 「今日のダイヤ番号」を起点に、対象日のダイヤ番号を計算する
   実際の端末の「今日」からの日数差で計算するので、基準日が多少古くなってもズレない */
function calcDial(target,todayDial){
  const today=new Date();today.setHours(0,0,0,0);
  const diff=Math.round((target-today)/86400000);
  return ((todayDial-1+diff)%25+25)%25+1;
}

/* 分割勤務の労働時間文字列（例:'3:01/6:25'）を合計時間（数値・h）に変換する */
function parseTotalHours(w){
  if(!w||w==='—')return 0;
  return w.split('/').reduce((sum,part)=>{
    const m=part.match(/(\d+):(\d+)/);
    return m?sum+parseInt(m[1])+parseInt(m[2])/60:sum;
  },0);
}

/* 出退勤時刻を画面表示用に見やすく整形する（2分割は前半/後半、3分割以上は番号表記） */
function formatDisplayTime(o){
  if(!o||o==='—')return '<span class="warn-text">要確認</span>';
  if(!o.includes('/'))return o;
  const parts=o.split('〜');
  if(parts.length!==2)return o;
  const starts=parts[0].split('/'),ends=parts[1].split('/');
  if(starts.length<2||ends.length<2)return o;
  const labels=starts.length===2?['前半','後半']:starts.map((_,i)=>`${i+1}本目`);
  const lines=[];
  for(let i=0;i<starts.length;i++)lines.push(`${labels[i]} ${starts[i]}〜${ends[i]}`);
  return lines.join('<br>');
}

/* 労働時間を画面表示用に整形する（2分割は前半/後半、3分割以上は番号表記） */
function formatDisplayLabor(w){
  if(!w||w==='—')return '—';
  if(!w.includes('/'))return w+'h';
  const parts=w.split('/');
  const labels=parts.length===2?['前半','後半']:parts.map((_,i)=>`${i+1}本目`);
  return parts.map((p,i)=>`${labels[i]} ${p}h`).join('<br>');
}

/* 時刻文字列を読み上げ用の日本語に変換する（24時以降は「翌」を付ける） */
function fmtT(t){
  if(!t)return '';
  t=t.trim();
  const m=t.match(/^(\d+):(\d+)$/);
  if(!m)return t;
  const h=parseInt(m[1]),min=m[2];
  if(h>=24)return `翌${h-24}時${min==='00'?'':min+'分'}`;
  return `${h}時${min==='00'?'':min+'分'}`;
}

/* 出退勤時刻の文字列を読み上げ用の自然な日本語文に変換する */
function timeToSpeech(o,w){
  if(!o||o==='—')return '詳細はダイヤ表を確認してください';
  if(!o.includes('/')){
    const [start,end]=o.split('〜');
    const ws=w?w.replace(':','時間')+'分':'';
    return `${fmtT(start)}から${fmtT(end)}。労働時間${ws}`;
  }
  const tildeSplit=o.split('〜');
  if(tildeSplit.length===2){
    const starts=tildeSplit[0].split('/'),ends=tildeSplit[1].split('/');
    const wParts=w?w.split('/'):[];
    if(starts.length>=2&&ends.length>=2){
      let text=`前半、${fmtT(starts[0])}から${fmtT(ends[0])}`;
      if(wParts[0])text+=`、労働${wParts[0].replace(':','時間')}分`;
      text+=`。後半、${fmtT(starts[1])}から${fmtT(ends[1])}`;
      if(wParts[1])text+=`、労働${wParts[1].replace(':','時間')}分`;
      text+='。';
      return text;
    }
  }
  return o.replace(/〜/g,'から').replace(/\//g,'または');
}

/* 出勤時刻からシフト種別（日勤／中間／遅出）を判定する */
function getShiftType(o){
  if(!o||o==='—')return null;
  if(o.includes('/'))return '中間';
  const firstStart=o.split('〜')[0].trim();
  const m=firstStart.match(/^(\d+):(\d+)/);
  if(!m)return null;
  const h=parseInt(m[1]);
  if(h>=14)return '遅出';
  return '日勤';
}

/* ==== 今日の勤務を読み上げ ==== */
function handleSpeakToday(){
  const v=parseInt(document.getElementById('todayInput').value);
  if(!v||v<1||v>25){speakText('ダイヤ番号を入力してください','speakTodayBtn');return;}
  const today=new Date();
  const m=today.getMonth()+1,d=today.getDate();
  const dw=DW[today.getDay()];
  const dt=dayType(today);
  const holLabel=isObon(today)?'お盆休みで土曜ダイヤ':isHol(today)?'祝日':'';
  const rec=DB[v];
  let text=`${m}月${d}日、${dw}曜日${holLabel}。${v}番ダイヤ。`;
  if(!rec||!rec[dt]){
    text+='公休。お疲れ様です！';
  }else{
    const slot=rec[dt];
    if(!slot||slot.o==='—'){
      text+='詳細はダイヤ表を確認してください。';
    }else{
      const st=getShiftType(slot.o);
      if(st)text+=`${st}。`;
      if(TEIIRE[v])text+=`${TEIIRE[v]}。`;
      text+=timeToSpeech(slot.o,slot.w)+'。';
    }
  }
  speakText(text,'speakTodayBtn');
}

/* ==== 検索結果を読み上げ ==== */
function handleSpeakResults(){
  const rows=window._lastRows;
  if(!rows||!rows.length){speakText('先に検索してください','speakResBtn');return;}
  let text='';
  rows.forEach(r=>{
    const allKyu=!r.rec||(r.rec&&r.slot===null);
    const holLabel=r.obon?'お盆休みで土曜ダイヤ':r.hol?'祝日':'';
    text+=`${r.m}月${r.d}日${r.dw}曜${holLabel}、${r.dn}番ダイヤ。`;
    if(allKyu){text+='公休。';}
    else if(r.slot&&r.slot.o!=='—'){
      const st=getShiftType(r.slot.o);
      if(st)text+=`${st}。`;
      if(TEIIRE[r.dn])text+=`${TEIIRE[r.dn]}。`;
      text+=timeToSpeech(r.slot.o,r.slot.w)+'。';
    }else{text+='要確認。';}
  });
  speakText(text,'speakResBtn');
}

/* ==== 音声読み上げ本体 ====
   句点「。」で文単位に分割し、1文ずつ順番に読み上げる。
   長い一文をタイマーで延命させる方式はAndroidで途切れやすいため、
   短い発話を鎖のようにつなげる方式にしている。 */
let _speakQueue=[];   // 読み上げ待ちの文章の配列
let _speakBtn=null;   // 現在読み上げ中のボタン要素

function speakText(text,btnId){
  if(!('speechSynthesis' in window)){showToast('このブラウザは読み上げ非対応です');return;}
  const btn=btnId?document.getElementById(btnId):null;

  // 読み上げ中（またはキュー待ち）なら、再タップで停止する
  if(window.speechSynthesis.speaking||_speakQueue.length){
    window.speechSynthesis.cancel();
    _speakQueue=[];
    if(_speakBtn){_speakBtn.textContent=_speakBtn.dataset.orig;_speakBtn.classList.remove('speaking');}
    _speakBtn=null;
    return;
  }

  // 句点で分割してキューに積む（空文字は除外）
  _speakQueue=text.split('。').map(s=>s.trim()).filter(s=>s).map(s=>s+'。');
  if(!_speakQueue.length){showToast('読み上げる内容がありません');return;}

  _speakBtn=btn;
  if(btn){btn.dataset.orig=btn.textContent;btn.textContent='⏹ 停止する';btn.classList.add('speaking');}

  // 端末に音声エンジンが1つも見つからない場合は、その旨を先に表示する
  // （この場合onerrorが発火せず無音になることがあるため、事前に分かるようにする）
  const voiceCount=window.speechSynthesis.getVoices().length;
  if(voiceCount===0){
    showToast('⚠ 音声エンジンが見つかりません（端末側の設定要確認）');
  }

  // ボタンのタップ操作と同じタイミングで同期的に呼び出す
  // （音声リストの読み込みを待って非同期にすると、ブラウザによっては
  // 「ユーザー操作起因ではない」と判定され再生がブロックされることがある）
  speakNextChunk();
}

/* キューの先頭を1文読み上げ、終わったら次の文へ進む */
function speakNextChunk(){
  if(!_speakQueue.length){
    if(_speakBtn){_speakBtn.textContent=_speakBtn.dataset.orig;_speakBtn.classList.remove('speaking');}
    _speakBtn=null;
    return;
  }
  const chunk=_speakQueue.shift();
  const utter=new SpeechSynthesisUtterance(chunk);
  utter.lang='ja-JP';utter.rate=0.95;utter.pitch=1.05;
  const voices=window.speechSynthesis.getVoices();
  const jaVoice=voices.find(v=>v.lang==='ja-JP')||voices.find(v=>v.lang.startsWith('ja'));
  if(jaVoice)utter.voice=jaVoice;
  utter.onend=speakNextChunk;
  utter.onerror=function(e){
    // 何のエラーで止まっているのかを画面に表示する（原因調査用）
    showToast('読み上げエラー: '+(e.error||'不明'));
    speakNextChunk();
  };
  window.speechSynthesis.speak(utter);
}

function stopSpeakIfNeeded(){
  if(window.speechSynthesis?.speaking)window.speechSynthesis.cancel();
  _speakQueue=[];
  if(_speakBtn){_speakBtn.textContent=_speakBtn.dataset.orig;_speakBtn.classList.remove('speaking');}
  _speakBtn=null;
}
document.addEventListener('visibilitychange',()=>{if(document.hidden)stopSpeakIfNeeded();});
window.addEventListener('pagehide',stopSpeakIfNeeded);
/* 注: 'blur'イベントでの停止は、スマホでボタンをタップした際に
   誤って発火し読み上げが即座に止まってしまうことがあるため削除した */

/* ==== 検索結果の描画 ==== */
function render(rows){
  const el=document.getElementById('resultsArea');
  if(!rows.length){el.innerHTML='<div class="empty">📋 該当する日がありません</div>';return;}
  const wkCnt=rows.filter(r=>r.rec&&r.slot&&r.slot.o!=='—').length;
  const kyuCnt=rows.filter(r=>!r.rec||(r.rec&&r.slot===null)).length;

  let html=`<div class="res-summary">${rows.length}日間 ／ 勤務${wkCnt}日 ／ 公休${kyuCnt}日</div>`;

  rows.forEach(r=>{
    const allKyu=!r.rec;
    const dayKyu=r.rec&&r.slot===null;
    const isOff=allKyu||dayKyu;

    let dateClass='day-date',badgeClass='day-badge badge-week',badgeText='平日';
    if(r.dt==='土'){dateClass+=' saturday';badgeClass='day-badge badge-sat';badgeText=r.obon?'お盆休みで土曜ダイヤ':'土曜';}
    if(r.dt==='日祝'){dateClass+=' holiday';badgeClass='day-badge badge-hday';badgeText=r.hol?'祝日':'日曜';}

    const totalH=(!isOff&&r.slot)?parseTotalHours(r.slot.w):0;
    const longClass=totalH>=9?' long':'';
    const longBadge=totalH>=9?'<span class="shift-badge sb-long">長時間</span>':'';

    let bodyHtml;
    if(isOff){
      bodyHtml=`<div class="day-boxes">
        <div class="day-box"><div class="day-box-label">勤務時間</div><div class="day-box-val holiday-val">公休</div></div>
        <div class="day-box"><div class="day-box-label">労働時間</div><div class="day-box-val" style="color:var(--dim)">—</div></div>
      </div>`;
    }else{
      const slot=r.slot;
      const teiireLabel=TEIIRE[r.dn]?`<div class="teiire-label">🔧 ${TEIIRE[r.dn]}</div>`:'';
      const noteHtml=slot.n?`<div class="day-note">📌 ${slot.n}</div>`:'';
      bodyHtml=`${teiireLabel}<div class="day-boxes">
        <div class="day-box"><div class="day-box-label">勤務時間</div><div class="day-box-val">${formatDisplayTime(slot.o)}</div></div>
        <div class="day-box"><div class="day-box-label">労働時間</div><div class="day-box-val">${formatDisplayLabor(slot.w)}</div></div>
      </div>${noteHtml}`;
    }

    html+=`<div class="day-card${longClass}">
      <div class="day-header">
        <div class="${dateClass}">${r.m}/${r.d}（${r.dw}）${r.hol?'🎌':''}${longBadge}</div>
        <div class="${badgeClass}">${badgeText}</div>
      </div>
      <div class="day-dial">${r.dn}<span> 番</span></div>
      ${bodyHtml}
    </div>`;
  });

  html+=`<div class="action-row">
    <button class="act-btn act-copy" onclick="copyResults()">📋 結果をコピー</button>
    <button class="act-btn act-tts" id="speakResBtn" onclick="handleSpeakResults()">🔊 読み上げ</button>
  </div>`;

  el.innerHTML=html;
  window._lastRows=rows;

  if(kyuCnt>0)launchMultipleFireworks(5);
  setTimeout(()=>{el.scrollIntoView({behavior:'smooth',block:'start'});},100);
}

/* ==== 検索時の音・バイブのフィードバック ====
   クイック検索と期間検索を区別できるよう、それぞれ異なるパターンにしている */
let _audioCtx=null;
function getAudioCtx(){
  try{
    if(!_audioCtx)_audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(_audioCtx.state==='suspended')_audioCtx.resume();
  }catch(e){}
  return _audioCtx;
}
/* 指定した周波数・長さ・開始タイミング(秒後)で単音を鳴らす */
function beep(freq,durationMs,delaySec){
  const ctx=getAudioCtx();
  if(!ctx)return;
  const t0=ctx.currentTime+(delaySec||0);
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.type='sine';
  osc.frequency.value=freq;
  gain.gain.setValueAtTime(0.16,t0);
  gain.gain.exponentialRampToValueAtTime(0.001,t0+durationMs/1000);
  osc.connect(gain);gain.connect(ctx.destination);
  osc.start(t0);osc.stop(t0+durationMs/1000);
}
/* 宇宙をイメージしたスペース音（上昇→下降の2音同時） */
function spaceBeep(){
  try{
    const ctx=getAudioCtx();
    if(!ctx)return;
    const now=ctx.currentTime;
    const osc1=ctx.createOscillator(),osc2=ctx.createOscillator(),gain=ctx.createGain();
    osc1.connect(gain);osc2.connect(gain);gain.connect(ctx.destination);
    osc1.type='sine';osc2.type='sine';
    osc1.frequency.setValueAtTime(200,now);
    osc1.frequency.exponentialRampToValueAtTime(400,now+0.3);
    osc2.frequency.setValueAtTime(300,now);
    osc2.frequency.exponentialRampToValueAtTime(150,now+0.3);
    gain.gain.setValueAtTime(0.2,now);
    gain.gain.exponentialRampToValueAtTime(0.001,now+0.5);
    osc1.start(now);osc2.start(now);
    osc1.stop(now+0.5);osc2.stop(now+0.5);
  }catch(e){console.log('音声エラー:',e);}
}
/* クイック検索用：ロケット花火音＋短いバイブ1回 */
function feedbackQuick(){
  rocketFirework();
  if(navigator.vibrate)navigator.vibrate(40);
}
/* 期間検索用：ロケット花火音＋バイブ2回 */
function feedbackRange(){
  rocketFirework();
  if(navigator.vibrate)navigator.vibrate([40,60,40]);
}

/* ==== 期間・クイック検索 ==== */
function buildAndRender(dial,from,to){
  const rows=[];
  let cur=new Date(from);
  while(cur<=to){
    const dn=calcDial(cur,dial);
    const dt=dayType(cur);
    const hol=isHol(cur);
    const obon=isObon(cur);
    const rec=DB[dn];
    rows.push({m:cur.getMonth()+1,d:cur.getDate(),dw:DW[cur.getDay()],dt,hol,obon,dn,rec,slot:rec?rec[dt]:null});
    cur.setDate(cur.getDate()+1);
  }
  render(rows);
}
/* 開始日から見た「1ヶ月間」の終了日を計算する（例: 7/5開始→8/4終了で、ちょうど1ヶ月間の日数になる） */
/* ※これは初期値(デフォルト)の計算にのみ使う。終了日は下のsearchRange内で自由に変更可能 */
function getRangeEnd(from){
  const to=addMonths(from,1);
  to.setDate(to.getDate()-1);
  return to;
}
function searchRange(){
  const dial=parseInt(document.getElementById('todayInput').value);
  if(!dial||dial<1||dial>25){showToast('今日のダイヤ番号を入力してください');return;}
  const fv=document.getElementById('dateFrom').value;
  const tv=document.getElementById('dateTo').value;
  if(!fv){showToast('開始日を入力してください');return;}
  const from=new Date(fv);
  const to=tv?new Date(tv):from;
  if(to<from){showToast('終了日は開始日以降にしてください');return;}
  if((to-from)/86400000>120){showToast('検索は最大120日間までです');return;}
  feedbackRange(); // 期間検索用のフィードバック
  buildAndRender(dial,from,to);
}
function quickSearch(type){
  const dial=parseInt(document.getElementById('todayInput').value);
  if(!dial||dial<1||dial>25){showToast('今日のダイヤ番号を入力してください');return;}
  feedbackQuick(); // クイック検索用のフィードバック
  const t=new Date();t.setHours(0,0,0,0);
  let from,to;
  if(type==='today'){from=to=t;}
  else if(type==='week1'){from=new Date(t);to=new Date(t);to.setDate(t.getDate()+6);}   // 今日から7日間
  else if(type==='week2'){from=new Date(t);to=new Date(t);to.setDate(t.getDate()+13);}  // 今日から14日間
  document.getElementById('dateFrom').value=toISO(from);
  document.getElementById('dateTo').value=toISO(to);
  buildAndRender(dial,from,to);
}

/* ==== コピー機能 ==== */
function copyResults(){
  const rows=window._lastRows;
  if(!rows||!rows.length){showToast('先に検索してください');return;}
  const lines=rows.map(r=>{
    const d=`${r.m}/${r.d}(${r.dw})`;
    const allKyu=!r.rec||(r.rec&&r.slot===null);
    if(allKyu)return `${d} ${r.dn}番 公休`;
    const t=r.slot;
    if(!t||t.o==='—')return `${d} ${r.dn}番 要確認`;
    return `${d} ${r.dn}番 ${t.o} 労${t.w}h`;
  });
  const text=lines.join('\n');
  navigator.clipboard.writeText(text).then(()=>{showToast('📋 コピーしました！');}).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('📋 コピーしました！');
  });
}

/* ==== 花火アニメーション（公休の日があったときのお楽しみ） ==== */
const fwc=document.getElementById('fw');
const fwx=fwc.getContext('2d');
let particles=[];
window.addEventListener('resize',()=>{fwc.width=window.innerWidth;fwc.height=window.innerHeight;});

/* 花火を1発打ち上げる（ダイヤ番号入力時に使用） */
function launchFireworks(){
  fwc.width=window.innerWidth;fwc.height=window.innerHeight;
  particles=[];
  burst();
  requestAnimationFrame(drawFw);
}
/* 複数の花火を連続で打ち上げる（公休判定時などに使用） */
function launchMultipleFireworks(count){
  fwc.width=window.innerWidth;fwc.height=window.innerHeight;
  particles=[];
  for(let i=0;i<count;i++)setTimeout(burst,i*300);
  requestAnimationFrame(drawFw);
}
function burst(){
  const x=Math.random()*fwc.width,y=Math.random()*fwc.height*0.5;
  const cols=['#ff0080','#00f5ff','#ffe600','#00ff88','#bf00ff','#ff8c00'];
  const c=cols[Math.floor(Math.random()*cols.length)];
  for(let i=0;i<45;i++){
    const a=(Math.PI*2/45)*i,sp=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,c,life:75});
  }
}
/* ロケット花火風の音：ぴゅーーーん（打ち上げ）→ドカン（爆発） */
/* 軽快な「ひゅーーーん」音：高音から始まり、だんだん小さくなりながら減衰していく */
function rocketFirework(){
  try{
    const ctx=getAudioCtx();
    if(!ctx)return;
    const now=ctx.currentTime;
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(1400,now);
    osc.frequency.exponentialRampToValueAtTime(500,now+0.9);
    gain.gain.setValueAtTime(0.18,now);
    gain.gain.exponentialRampToValueAtTime(0.001,now+0.9);
    osc.start(now);osc.stop(now+0.9);
  }catch(e){console.log('効果音エラー:',e);}
}
function drawFw(){
  fwx.clearRect(0,0,fwc.width,fwc.height);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.life--;
    fwx.globalAlpha=p.life/75;fwx.fillStyle=p.c;
    fwx.beginPath();fwx.arc(p.x,p.y,3,0,Math.PI*2);fwx.fill();
  });
  fwx.globalAlpha=1;
  if(particles.length>0)requestAnimationFrame(drawFw);
  else fwx.clearRect(0,0,fwc.width,fwc.height);
}
